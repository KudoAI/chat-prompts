name: Validate links on push + PR

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linkinator:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: JustinBeckwith/linkinator-action@v2.4.0
        with:
          paths: '**/*.md'
          checkFragments: true
          statusCodes: '{ "429": "skip" }'
